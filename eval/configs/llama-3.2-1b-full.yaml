model_id: meta-llama/Llama-3.2-1B-Instruct
description: "Llama 3.2 1B full DFloat11 pipeline: embedding + transformer linears + lm_head"
precision: bfloat16
bundle_path: compressed/llama-3.2-1b-full.df11tt
results_dir: results/llama-3.2-1b-full/raw
compress_patterns:
  - "model\\.embed_tokens"
  - ".*\\.self_attn\\.(q_proj|k_proj|v_proj|o_proj)"
  - ".*\\.mlp\\.(gate_proj|up_proj|down_proj)"
  - "lm_head"
eval_suite:
  - output_equivalence
prompt_file: eval/prompts/smoke_prompt.txt
prompt_limit: 1
max_new_tokens: 16
compare_logits: true
reference_backend: ttnn
wrap_blocks: false
